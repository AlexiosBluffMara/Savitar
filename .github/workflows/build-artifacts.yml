name: build-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          output_dir="dist/savitar-${GOOS}-${GOARCH}"
          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$output_dir/savitar" ./cmd/savitar
          tar -C dist -czf "dist/savitar-${GOOS}-${GOARCH}.tar.gz" "savitar-${GOOS}-${GOARCH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: savitar-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/savitar-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz